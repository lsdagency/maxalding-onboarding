# Maxalding onboarding rules, machine-readable.
#
# Derived from the System Prompt (source of truth) and the Onboarding Feedback
# Log (live corrections). The agents load this so the prompt can change without
# losing a rule, and the validator constants in validator/rules.py mirror it.
# Each rule carries provenance so it is traceable to the client and date.
#
# Keep this file clean: no em dashes, en dashes, exclamation marks or ellipses.

version: "0.13.1"

banned_characters:
  - id: em-dash
    description: "No em dashes anywhere, including build-script strings."
    source: "System Prompt s3; Feedback 2026-05-19 R1, 2026-05-21 R11"
  - id: en-dash
    description: "No en dashes anywhere."
    source: "System Prompt s3; Feedback 2026-05-19 R1"
  - id: exclamation
    description: "No exclamation marks."
    source: "System Prompt s3"
  - id: ellipsis
    description: "No ellipses for effect (glyph or three periods)."
    source: "System Prompt s3"

banned_words:
  applies_to: "audience-facing copy, not rule-statement cells"
  words: [structure, framework]
  note: "Banned only in the programme/plan/approach sense. Replace with approach, method, process, plan, routine, the way it works, way of working."
  source: "System Prompt s3; Feedback 2026-05-19 R1"

client_word_bans:
  note: "Pull the live list from the client Brand memory. Example fitness list below."
  example: [quick fix, miracle, extreme, hack, guaranteed transformation, fear tactics, negative comparisons, unrealistic claims]
  source: "System Prompt s3"

banned_formula:
  pattern: "It is not a [X] problem, it is a [Y] problem"
  note: "Never use this or close variants. State the idea directly."
  source: "System Prompt s3"

positive_language:
  rule: "Never frame the problem as a personal failing, even when negating it."
  avoid: ["you are not lazy", "the gym did not fail you", "you have not been consistent", "stop making excuses", "you know you should"]
  replace_with:
    "you are not lazy": "you have been doing this without the right support"
    "you have not been consistent": "consistency becomes easier when the approach fits your life"
  applies_to: [hooks, post copy, scripts, vsl, landing page]
  source: "System Prompt s3; Feedback 2026-05-19 R4"

meta_compliance:
  rule: "Standing pass on all paid creative before output."
  banned:
    - "Asserting or implying the viewer's weight, body, or health."
    - "Specific weight-loss numbers anywhere, including inside testimonials, unless documented and permitted."
    - "'you' plus a negative physical trait."
    - "Body-shaming language: problem areas, belly fat, beach body, hate what you see in the mirror, ashamed, embarrassed, disgusted."
    - "Idealised, shirtless or shock-contrast before-and-after imagery. Before-and-after must be realistic and modest."
    - "Medical claims or superiority claims without documented proof."
  preferred:
    - "Aspirational, forward-looking benefit language that does not diagnose the viewer."
    - "Naming an actual service or lead magnet (names an offer, not the viewer's body)."
    - "Framing any client result as one person's individual experience, no numbers unless documented."
  source: "System Prompt s4; Feedback 2026-06-18"

premium_framing:
  rule: "The lead magnet is the way in but must never read as cheap or discounted."
  scope: "High-ticket offers only, roughly 300 to 800 dollars and up."
  banned_in_audience_copy: [free, no cost, no pressure, costs nothing, no obligation]
  preferred_vocabulary: [private, personalised, complimentary, consultation, expert, tailored]
  cta_example: "Book My Consultation"
  per_client_flag: "premium_lead_magnet (client data, default true). Set false for a low-ticket local client whose genuine front end is a free trial or session. When false, build.build_all waives the premium-framing rule and the standalone validator can waive it with --skip-rules premium-framing."
  source: "System Prompt s5; Feedback 2026-06-18, 2026-06-26 (Peak with Hamza)"

length_limits:
  post_copy_max_chars: 125
  headline_max_chars: 40
  description_max_chars: 25
  video_hook_max_words: 25
  video_hook_note: "A video hook is a SPOKEN opening line and may be a full sentence or two (ad-hooks skill), not a short fragment. Capped generously at 25 words. Static overlay hooks stay 5 to 10 words."
  static_hook_words: "5 to 10"
  source: "System Prompt s8; Feedback 2026-07-07 (UBX)"

post_copy_style:
  no_trailing_full_stop: true
  note: "Post copy must not end with a full stop; it reads unnatural in an ad. End on the word, a question mark where a question fits, or an emoji. The validator flags a trailing full stop on post copy as a warning."
  emoji: "Lean into emoji a bit more than feels obvious, around a third of the posts carrying one, varied and never one-per-row, with some posts left bare. Prefer premium, on-brand emoji (for example sparkle, white heart, warm heart, leaf, location pin, house, sun) and never hype or loud ones (no fire, 100, rocket, heart-eyes), subject to brand tone. Match the emoji to the AUDIENCE, not only the brand: for a male or masculine audience (for example men over 30), avoid soft or feminine-coded emoji such as white heart, warm heart, leaf or sun; use a neutral relevant emoji like a location pin sparingly, or none. The set is a menu, not a mandate; fewer emoji often reads better for a masculine audience."
  emoji_source: "Feedback 2026-06-24 (FIT Republik) and 2026-06-26 (Peak with Hamza): use a few MORE, and make them premium. 2026-07-07 (Built By Brun): match emoji to the audience; white hearts were wrong for men over 30."
  emoji_palette: "Derive a per-client emoji palette from the ICP at intake (a short, on-brand, audience-appropriate set), store it in the Brand Pack tone of voice, and draw POST COPY emoji from it, matched to each post's angle. Do not just strip emoji when they do not fit; replace them with palette emoji that suit the audience."
  emoji_palette_source: "Feedback 2026-07-07 (Built By Brun): do not just remove emoji, build a per-client palette from the ICP."
  source: "Feedback 2026-06-24 (FIT Republik)"

hook_style:
  video: "Each of the three video hook options (Creative Tracker video rows and Video Ad Script Option A/B/C) must sound like a voicenote said out loud to camera: natural spoken English, contractions, a real spoken opener where it fits (Okay, Real quick, Here's the thing, Don't scroll past this). Not a written slogan. The three must span DIFFERENT hook types, never three wordings of one idea: mix question, curiosity gap, urgency, bold statement, empathy or relatable and pattern interrupt, with at least one statement. Carry the campaign theme through without making all three sell."
  register: "The hook register must match the ICP's age and world, never a generic social voice. No under-30 slang (real talk, no cap, lowkey, vibe) for an over-30 audience. Slang only when the coach or ICP genuinely uses it on the transcript. Invoke the ad-hooks skill every time hooks are written or rewritten, including revision rounds."
  register_source: "Feedback 2026-07-15 (Built By Brun): 'real talk' aimed at men over 30 flagged; hooks had been rewritten by hand without re-invoking the skill."
  note: "Craft rule, not machine-enforceable; the validator still checks hook length and the labelled format."
  source: "Feedback 2026-07-02 (UBX); extends Built By Brun 2026-06-29 (natural spoken scripts) and (labelled hooks, real Meta hook craft)"

naming_convention:
  pattern: "MAXALDING - [Client Business Name] - [Campaign] - [Deliverable].[ext]"
  campaign_segment: "Required for any campaign-specific deliverable so the file is identifiable on its own, away from its campaign folder (for example two Meta Ad Copy files for different campaigns). Use a short campaign name. Omit only for genuinely client-wide files; the validator accepts both forms."
  separator: " - "
  forbid: [em dashes, underscores]
  deliverables:
    Creative Plan: xlsx
    Meta Ad Copy: xlsx
    Meta Lead Form Copy: xlsx
    Meta Ad & Lead Form Copy: xlsx
    Video Ad Scripts: docx
    VSL Script: docx
    Landing Page Copy: docx
    CRM Automation: docx
  note: "SCRIPT column in the tracker references the Video Ad Scripts filename. Meta Ad Copy / Lead Form deliverables come from the standalone meta-ad-copy and meta-lead-form skills."
  saving: "Save every campaign deliverable into its own per-campaign subfolder in the workspace: workspace/clients/[Client]/[Mon-DD-descriptor-campaign]/ (for example Aug-01-anniversary-campaign). Never drop a new campaign's files into the client root or another campaign's folder. Client-wide reference files (client profile, audits) stay at the client root."
  source: "System Prompt s6; Feedback 2026-06-18, 2026-07-15 (UBX campaign segment + per-campaign subfolders)"

documents:
  no_date_in_header: true
  header_fields: [CLIENT, CAMPAIGN, PREPARED BY]
  logo: "Insert Maxalding Logo.png from the workspace folder at the top of every deck."
  typography:
    font: "Helvetica Neue (set on every run)"
    main_heading_pt: 16
    subheading_pt: 14
    body_pt: 10
    script_line_color: "#787878"
    direction_note_color: "#505050"
  source: "System Prompt s7, s9 to s12; Feedback 2026-05-19 R7, 2026-05-20 R8, 2026-06-18"

creative_plan:
  brand_pack_sections: [CHANNELS, AUDIENCE, TONE OF VOICE, OFFER, BRAND POSITIONING]
  brand_pack_no_kpis: true
  tracker_columns: ["#", DATE, FORMAT, RESOLUTION, STATUS, PLATFORM, FILE TYPE, AUDIENCE, CONCEPT, HOOK, BEATS, DETAILS, EDITING DIRECTION, FILMING DIRECTION, SCRIPT, FINAL ASSET]
  tracker_rows: "5 statics then 8 videos (13 total)"
  file_type_formula: '=IF(C{row}="STATIC","JPG","MP4")'
  resolution_string: "1080 x 1350 (4:5) / 1080 x 1920 (9:16)"
  status_dropdown: [Briefed, Filmed, In Edit, Signed Off, Live]
  platform_dropdown: ["FACEBOOK + INSTAGRAM", FACEBOOK, INSTAGRAM, TIKTOK]
  ad_copy_columns: ["#", CONCEPT, POST COPY, CHARS]
  ad_copy_structure: "distinct concepts only, 5 post variations each, one shared block of 5 headlines, one shared description"
  source: "System Prompt s8; Feedback 2026-06-18"

workspace:
  rule: "The package is read-only at runtime. Writable state lives in the workspace folder."
  contents: [Maxalding Logo.png, Onboarding Feedback Log, per-client brand kits, generated client outputs]
  env_var: MAXALDING_WORKSPACE
  source: "System Prompt s7; Improvement Roadmap s6; Feedback 2026-05-19 R5"

feedback_loop:
  rule: "At end of any session with feedback, append a dated entry to the workspace feedback log."
  entry_format: "## [YYYY-MM-DD] - [Client name] - [brief summary]"
  source: "System Prompt s15"
